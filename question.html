<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Question</title>

<style>
body { background:#0f172a; color:white; font-family:sans-serif; }

.container { display:flex; gap:20px; }

.left, .right {
  width:50%;
  background:#1e293b;
  padding:15px;
  border-radius:8px;
}

textarea {
  width:100%;
  height:250px;
  background:#0f172a;
  color:white;
  border:1px solid #334155;
}

button { margin-top:10px; padding:10px; cursor:pointer; }

#output {
  margin-top:20px;
  padding:10px;
  background:#111;
  border-radius:6px;
}
</style>
</head>

<body>

<h1 id="q-title"></h1>

<div style="margin: 20px;">
  <div style="background:#1e293b; height:10px; border-radius:10px;">
    <div id="progress-fill" style="height:100%; width:0%; background:linear-gradient(90deg,#38bdf8,#6366f1); border-radius:10px;"></div>
  </div>
  <p id="progress-text"></p>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <h3>Description</h3>
    <p id="q-desc"></p>

    <h4>Example</h4>
    <p id="q-example"></p>

    <h4>Constraints</h4>
    <ul id="q-constraints"></ul>
  </div>

  <!-- RIGHT (dynamic) -->
  <div class="right" id="right-panel"></div>

</div>

<div id="output">Output will appear here...</div>

<div style="margin-top:20px;">
  <button onclick="nextQuestion()">Next Question →</button>
</div>
<script src="script.js"></script>
</body>
</html>
