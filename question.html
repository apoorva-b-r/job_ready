<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Question</title>

<style>
:root {
  /* Dark Mode (Default) - Refined Lavender/Soft Pink Accents */
  --bg: #0f1621;
  --text: #e2e2e2;
  --card: #1a232f;
  --input: #0d1118;
  --border: #2a3648;
  --output: #0d1118;
  --muted: #8b8b8b;
  --accent: #d4a7d4;
  --accent-2: #a873a8;
  --button-text: #ffffff;
  --shadow: 0 20px 45px rgba(2, 8, 23, 0.45);
  --soft-shadow: 0 10px 25px rgba(2, 8, 23, 0.25);
}

.light {
  /* Light Mode - Refined Global Pastel Scheme */
  --bg: #faf9f7;
  --text: #1a1a1a;
  --card: #ffffff;
  --input: #ffffff;
  --border: #e0dcd8;
  --output: #f3f1ee;
  --muted: #555555;
  --accent: #d4a7d4;
  --accent-2: #a873a8;
  --button-text: #ffffff;
  --shadow: 0 20px 45px rgba(15, 23, 42, 0.1);
  --soft-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: "Inter", "Segoe UI", Arial, sans-serif;
  line-height: 1.55;
  transition: background 0.25s ease, color 0.25s ease;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px clamp(16px, 4vw, 44px);
  border-bottom: 1px solid var(--border);
  background: color-mix(in srgb, var(--card) 72%, transparent);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 20;
}

.brand {
  font-size: clamp(18px, 2.4vw, 24px);
  font-weight: 700;
  letter-spacing: 0.2px;
}

.page-wrap {
  width: min(1120px, 100% - 28px);
  margin: 26px auto 40px;
}

#q-title {
  font-size: clamp(24px, 3.8vw, 34px);
  line-height: 1.2;
  margin: 8px 0 18px;
  letter-spacing: -0.03em;
}

.progress-wrap {
  margin-bottom: 22px;
  padding: 16px 18px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--card);
  box-shadow: var(--soft-shadow);
}

.progress-track {
  background: var(--input);
  height: 12px;
  border-radius: 999px;
  overflow: hidden;
  border: 1px solid var(--border);
}

#progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  border-radius: 999px;
  transition: width 0.28s ease;
}

#progress-text {
  margin: 10px 0 0;
  color: var(--muted);
  font-size: 14px;
  font-weight: 500;
}

.container {
  display: grid;
  grid-template-columns: minmax(300px, 1fr) minmax(340px, 1.15fr);
  gap: 20px;
}

.left, .right {
  background: var(--card);
  padding: 22px;
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

.left h3,
.left h4 {
  margin: 0 0 10px;
}

.left h3 {
  font-size: 20px;
}

.left h4 {
  margin-top: 18px;
  font-size: 16px;
  color: var(--muted);
}

#q-desc,
#q-example,
#q-constraints {
  color: var(--text);
}

#q-constraints {
  margin: 0;
  padding-left: 20px;
}

#q-constraints li {
  margin-bottom: 8px;
}

.right {
  position: relative;
}

.right::before {
  content: "Code Workspace";
  display: block;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

textarea {
  width: 100%;
  min-height: 270px;
  resize: vertical;
  background: var(--input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 15px;
  font-size: 15px;
  font-family: "JetBrains Mono", "Fira Code", Menlo, monospace;
  line-height: 1.6;
  box-sizing: border-box;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent);
}

button {
  margin-top: 10px;
  padding: 11px 18px;
  border-radius: 10px;
  border: 1px solid transparent;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: var(--button-text);
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
  box-shadow: 0 8px 16px color-mix(in srgb, var(--accent-2) 30%, transparent);
}

button:hover {
  transform: translateY(-1px);
  filter: brightness(1.02);
}

button:active {
  transform: translateY(0);
}

#output {
  margin-top: 20px;
  padding: 16px 18px;
  background: var(--output);
  border-radius: 14px;
  border: 1px solid var(--border);
  box-shadow: var(--soft-shadow);
  min-height: 58px;
}

.actions {
  margin-top: 20px;
  display: flex;
  justify-content: flex-end;
}

#react-toggle {
  display: flex;
  justify-content: flex-end;
}

#react-toggle button {
  margin: 0;
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  box-shadow: none;
}

@media (max-width: 900px) {
  .container {
    grid-template-columns: 1fr;
  }

  .left, .right {
    padding: 18px;
  }

  .actions {
    justify-content: stretch;
  }

  .actions button {
    width: 100%;
  }
}
</style>
</head>

<body>
<div class="topbar">
  <h1 class="logo">
  <span class="logo-icon">
    <!-- SVG ICON -->
    <svg width="36" height="36" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer Circle -->
      <circle cx="40" cy="40" r="36" fill="#e8d5f2"/>

      <!-- Resume Sheet -->
      <rect x="26" y="20" width="28" height="36" rx="4" fill="#ffffff"/>

      <!-- Resume Lines -->
      <rect x="30" y="26" width="20" height="3" rx="2" fill="#d4a7d4"/>
      <rect x="30" y="32" width="18" height="3" rx="2" fill="#d4a7d4"/>
      <rect x="30" y="38" width="16" height="3" rx="2" fill="#d4a7d4"/>

      <!-- Checkmark Circle -->
      <circle cx="50" cy="48" r="10" fill="#9d5fa0"/>

      <!-- Tick -->
      <path d="M45 48 L49 52 L56 44" 
            stroke="white" 
            stroke-width="3" 
            fill="none" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
    </svg>
  </span>

  JobReady
</h1>
  <div id="react-toggle"></div>
</div>

<div class="page-wrap">
<h1 id="q-title"></h1>

<div class="progress-wrap">
  <div class="progress-track">
    <div id="progress-fill"></div>
  </div>
  <p id="progress-text"></p>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <h3>Description</h3>
    <p id="q-desc"></p>

    <h4>Example</h4>
    <p id="q-example"></p>

    <h4>Constraints</h4>
    <ul id="q-constraints"></ul>
  </div>

  <!-- RIGHT (dynamic) -->
  <div class="right" id="right-panel"></div>

</div>

<div id="output">Output will appear here...</div>

<div class="actions">
  <button onclick="nextQuestion()">Next Question →</button>
</div>
</div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
function ThemeToggle() {
  const [dark, setDark] = React.useState(() => {
    const saved = localStorage.getItem("theme");
    return saved ? saved === "dark" : true;
  });

  React.useEffect(() => {
    document.body.classList.toggle("light", !dark);
    localStorage.setItem("theme", dark ? "dark" : "light");
  }, [dark]);

  return (
    <button onClick={() => setDark(!dark)}>
      {dark ? "☀️ Light" : "🌙 Dark"}
    </button>
  );
}
  ReactDOM.createRoot(document.getElementById("react-toggle"))
    .render(<ThemeToggle />);
</script>
<script src="script.js"></script>

</body>
</html>
