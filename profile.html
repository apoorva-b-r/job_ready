<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --bg: #0f172a;
      --text: #f8fafc;
      --card: #1e293b;
      --input: #0b1220;
      --border: #334155;
      --output: #0b1220;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #6366f1;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    .light {
      --bg: #f8fafc;
      --text: #0f172a;
      --card: #ffffff;
      --input: #ffffff;
      --border: #dbe2ef;
      --output: #edf2f7;
      --muted: #475569;
      --accent: #0ea5e9;
      --accent-2: #4f46e5;
      --success: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 500px at -10% -10%, color-mix(in srgb, var(--accent) 15%, transparent), transparent 55%),
        radial-gradient(800px 460px at 110% -10%, color-mix(in srgb, var(--accent-2) 15%, transparent), transparent 55%),
        var(--bg);
      padding: 28px;
    }

    .dashboard {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .header-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-shadow: 0 14px 32px rgba(2, 8, 23, 0.22);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .header-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 36px rgba(2, 8, 23, 0.26);
    }

    .user-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      flex: 0 0 auto;
    }

    .title {
      margin: 0;
      font-size: clamp(22px, 3vw, 30px);
      letter-spacing: -0.02em;
    }

    #user-name {
      margin: 4px 0 2px;
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #user-email {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .total-pill {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      color: var(--muted);
      background: color-mix(in srgb, var(--output) 70%, transparent);
      white-space: nowrap;
    }

    #total-solved {
      color: var(--text);
      font-weight: 700;
      margin-left: 6px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 18px;
    }

    .profile-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 12px 28px rgba(2, 8, 23, 0.2);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .profile-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(2, 8, 23, 0.24);
      border-color: color-mix(in srgb, var(--accent) 38%, var(--border));
    }

    .analysis-card {
      grid-column: span 5;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .insight-card {
      grid-column: span 4;
    }

    .progress-card {
      grid-column: span 3;
    }

    .report-card {
      grid-column: 1 / -1;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 16px;
      letter-spacing: 0.02em;
      font-weight: 700;
    }

    .score-widget {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: center;
    }

    .score-ring {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, var(--card) 58%, transparent 59%),
        conic-gradient(var(--accent) 0deg, var(--accent-2) 290deg, color-mix(in srgb, var(--border) 80%, transparent) 290deg);
      border: 1px solid var(--border);
    }

    #score {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }

    .score-caption {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
      text-align: center;
    }

    .meta {
      display: grid;
      gap: 10px;
    }

    .meta-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    #role {
      display: inline-block;
      font-weight: 700;
      text-transform: uppercase;
      padding: 8px 12px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    .list-wrap {
      display: grid;
      gap: 16px;
    }

    ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
    }

    #strengths li,
    #weaknesses li {
      line-height: 1.5;
    }

    .strength-title,
    .weak-title {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .strength-title {
      color: var(--success);
    }

    .weak-title {
      color: var(--warning);
      margin-top: 4px;
    }

    .progress-list {
      display: grid;
      gap: 14px;
    }

    .progress-row {
      display: grid;
      gap: 6px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    .progress-value {
      font-weight: 700;
      color: var(--text);
      min-width: 26px;
      text-align: right;
    }

    .bar {
      width: 100%;
      height: 9px;
      border-radius: 999px;
      background: var(--input);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .fill {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      opacity: 0.9;
      transition: transform 0.3s ease;
      transform-origin: left;
    }

    .progress-row:hover .fill {
      transform: scaleX(1.02);
    }

    .report-shell {
      margin-top: 10px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: color-mix(in srgb, var(--output) 65%, transparent);
      padding: 14px;
      min-height: 70px;
    }

    #analysis-report {
      color: var(--text);
      line-height: 1.8;
      letter-spacing: 0.01em;
    }

    #analysis-report p,
    #analysis-report li {
      margin-bottom: 10px;
    }

    #analysis-report h2,
    #analysis-report h3,
    #analysis-report h4 {
      margin-top: 14px;
      margin-bottom: 10px;
    }

    @media (max-width: 1024px) {
      .analysis-card,
      .insight-card,
      .progress-card {
        grid-column: span 6;
      }
    }

    @media (max-width: 760px) {
      body {
        padding: 16px;
      }

      .header-card {
        flex-direction: column;
        align-items: flex-start;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }

      .analysis-card,
      .insight-card,
      .progress-card,
      .report-card {
        grid-column: auto;
      }

      .score-widget {
        grid-template-columns: 1fr;
        justify-items: start;
      }
    }
  </style>
</head>

<body>

<main class="dashboard">

  <header class="header-card">
    <div class="user-wrap">
      <div class="avatar">👤</div>
      <div>
        <h1 class="title">Profile Dashboard</h1>
        <h2 id="user-name"></h2>
        <p id="user-email"></p>
      </div>
    </div>
    <div class="total-pill">Total Solved <span id="total-solved">0</span></div>
  </header>

  <section class="cards-grid">

    <div class="profile-card analysis-card">
      <h3 class="section-title">📊 Resume Analysis</h3>
      <div class="score-widget">
        <div>
          <div class="score-ring">
            <span id="score"></span>
          </div>
          <div class="score-caption">Resume Score</div>
        </div>
        <div class="meta">
          <div>
            <div class="meta-label">Best Role</div>
            <span id="role"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="profile-card insight-card">
      <h3 class="section-title">🧠 Strengths & Weaknesses</h3>
      <div class="list-wrap">
        <div>
          <h4 class="strength-title">✅ Strengths</h4>
          <ul id="strengths"></ul>
        </div>
        <div>
          <h4 class="weak-title">⚠️ Weaknesses</h4>
          <ul id="weaknesses"></ul>
        </div>
      </div>
    </div>

    <div class="profile-card progress-card">
      <h3 class="section-title">📈 Progress</h3>
      <div class="progress-list">
        <div class="progress-row">
          <div class="progress-top">
            <span>DSA Solved</span>
            <span class="progress-value" id="dsa-count"></span>
          </div>
          <div class="bar"><div class="fill"></div></div>
        </div>

        <div class="progress-row">
          <div class="progress-top">
            <span>HR Solved</span>
            <span class="progress-value" id="hr-count"></span>
          </div>
          <div class="bar"><div class="fill"></div></div>
        </div>

        <div class="progress-row">
          <div class="progress-top">
            <span>Aptitude Solved</span>
            <span class="progress-value" id="apt-count"></span>
          </div>
          <div class="bar"><div class="fill"></div></div>
        </div>
      </div>
    </div>

    <div class="profile-card report-card">
      <h3 class="section-title">📝 Detailed Analysis Report</h3>
      <div class="report-shell">
        <div id="analysis-report"></div>
      </div>
    </div>

  </section>
</main>

<script src="script.js"></script>
</body>
</html>
