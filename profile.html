<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - JobReady</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .dashboard {
      max-width: 1180px;
      margin: 0 auto;
      padding: var(--spacing-xl);
      display: grid;
      gap: var(--spacing-lg);
    }

    .header-card {
      background: var(--color-card);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--spacing-lg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-lg);
      box-shadow: var(--shadow-md);
    }

    .header-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
      border-color: var(--color-accent);
    }

    .user-wrap {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 28px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
      flex: 0 0 auto;
    }

    .title {
      margin: 0;
      font-size: var(--font-size-2xl);
      color: var(--color-accent);
      font-weight: var(--font-weight-bold);
      letter-spacing: -0.01em;
    }

    #user-name {
      margin: var(--spacing-sm) 0 var(--spacing-xs);
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-bold);
    }

    #user-email {
      margin: 0;
      color: var(--color-text-light);
      font-size: var(--font-size-sm);
    }

    .total-pill {
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-full);
      padding: var(--spacing-md);
      font-size: var(--font-size-sm);
      color: var(--color-text-light);
      background: linear-gradient(135deg, var(--color-card) 0%, var(--color-bg-alt) 100%);
      white-space: nowrap;
      box-shadow: var(--shadow-sm);
    }

    #total-solved {
      font-weight: var(--font-weight-bold);
      color: var(--color-text);
      margin-left: var(--spacing-xs);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: var(--spacing-lg);
    }

    .profile-card {
      background: var(--color-card);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      box-shadow: var(--shadow-sm);
      transition: all var(--transition-base);
    }

    .profile-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
      border-color: var(--color-accent);
    }

    .analysis-card {
      grid-column: span 5;
    }

    .insight-card {
      grid-column: span 4;
    }

    .progress-card {
      grid-column: span 3;
    }

    .report-card {
      grid-column: 1 / -1;
    }

    .section-title {
      margin: 0 0 var(--spacing-md);
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-bold);
      color: var(--color-accent);
      letter-spacing: 0.02em;
    }

    .score-widget {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: var(--spacing-lg);
      align-items: center;
    }

    .score-ring {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--color-accent) 0deg, var(--color-primary) 290deg, var(--color-border) 290deg);
      border: 1.5px solid var(--color-border);
      position: relative;
      box-shadow: var(--shadow-sm);
    }

    .score-ring::after {
      content: '';
      position: absolute;
      width: 85%;
      height: 85%;
      border-radius: 50%;
      background: var(--color-card);
    }

    #score {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
      color: var(--color-accent);
      position: relative;
      z-index: 1;
    }

    .score-caption {
      color: var(--color-text-light);
      font-size: var(--font-size-xs);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: var(--spacing-md);
      text-align: center;
    }

    .meta {
      display: grid;
      gap: var(--spacing-md);
    }

    .meta-label {
      font-size: var(--font-size-xs);
      color: var(--color-text-light);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #role {
      display: inline-block;
      font-weight: var(--font-weight-bold);
      text-transform: uppercase;
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--radius-full);
      color: white;
      background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-primary) 100%);
      font-size: var(--font-size-xs);
      letter-spacing: 0.05em;
      box-shadow: var(--shadow-md);
    }

    .list-wrap {
      display: grid;
      gap: var(--spacing-lg);
    }

    .strength-title,
    .weak-title {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-bold);
      margin: 0 0 var(--spacing-sm);
    }

    .strength-title {
      color: var(--color-success);
    }

    .weak-title {
      color: var(--color-warning);
    }

    #strengths li,
    #weaknesses li {
      line-height: 1.6;
    }

    .progress-list {
      display: grid;
      gap: var(--spacing-lg);
    }

    .progress-row {
      display: grid;
      gap: var(--spacing-xs);
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      font-size: var(--font-size-sm);
    }

    .progress-value {
      font-weight: var(--font-weight-bold);
      color: var(--color-primary-dark);
    }

    .bar {
      height: 10px;
      border-radius: var(--radius-full);
      background: var(--color-border-light);
      overflow: hidden;
      border: 1px solid var(--color-border);
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-accent) 0%, var(--color-primary) 50%, var(--color-accent) 100%);
      border-radius: var(--radius-full);
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(157, 95, 160, 0.3);
    }

    .report-shell {
      border: 1.5px dashed var(--color-border);
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, var(--color-card) 0%, var(--color-bg-alt) 100%);
      padding: var(--spacing-lg);
      min-height: 100px;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.03);
    }

    #analysis-report {
      line-height: 1.8;
      color: var(--color-text);
    }

    #analysis-report h3,
    #analysis-report h4 {
      color: var(--color-primary-dark);
      margin: var(--spacing-lg) 0 var(--spacing-md);
    }

    #analysis-report p,
    #analysis-report li {
      margin-bottom: var(--spacing-md);
      color: var(--color-text-light);
    }

    @media (max-width: 1024px) {
      .analysis-card,
      .insight-card,
      .progress-card {
        grid-column: span 6;
      }
    }

    @media (max-width: 768px) {
      .dashboard {
        padding: var(--spacing-lg);
      }

      .header-card {
        flex-direction: column;
        align-items: flex-start;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }

      .analysis-card,
      .insight-card,
      .progress-card,
      .report-card {
        grid-column: auto;
      }

      .score-widget {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<nav class="navbar">
  <h1 class="logo">
  <span class="logo-icon">
    <!-- SVG ICON -->
    <svg width="36" height="36" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer Circle -->
      <circle cx="40" cy="40" r="36" fill="#e8d5f2"/>

      <!-- Resume Sheet -->
      <rect x="26" y="20" width="28" height="36" rx="4" fill="#ffffff"/>

      <!-- Resume Lines -->
      <rect x="30" y="26" width="20" height="3" rx="2" fill="#d4a7d4"/>
      <rect x="30" y="32" width="18" height="3" rx="2" fill="#d4a7d4"/>
      <rect x="30" y="38" width="16" height="3" rx="2" fill="#d4a7d4"/>

      <!-- Checkmark Circle -->
      <circle cx="50" cy="48" r="10" fill="#9d5fa0"/>

      <!-- Tick -->
      <path d="M45 48 L49 52 L56 44" 
            stroke="white" 
            stroke-width="3" 
            fill="none" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
    </svg>
  </span>

  JobReady
</h1>
  <div class="auth-buttons" id="nav-actions"></div>
</nav>

<main class="dashboard">

  <header class="header-card">
    <div class="user-wrap">
      <div class="avatar">👤</div>
      <div>
        <h1 class="title">Profile Dashboard</h1>
        <h2 id="user-name"></h2>
        <p id="user-email"></p>
      </div>
    </div>
    <div class="total-pill">Total Solved <span id="total-solved">0</span></div>
  </header>

  <section class="cards-grid">

    <div class="profile-card analysis-card">
      <h3 class="section-title">📊 Resume Analysis</h3>
      <div class="score-widget">
        <div>
          <div class="score-ring">
            <span id="score"></span>
          </div>
          <div class="score-caption">Resume Score</div>
        </div>
        <div class="meta">
          <div>
            <div class="meta-label">Best Role</div>
            <span id="role"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="profile-card insight-card">
      <h3 class="section-title">🧠 Strengths & Weaknesses</h3>
      <div class="list-wrap">
        <div>
          <h4 class="strength-title">✅ Strengths</h4>
          <ul id="strengths"></ul>
        </div>
        <div>
          <h4 class="weak-title">⚠️ Weaknesses</h4>
          <ul id="weaknesses"></ul>
        </div>
      </div>
    </div>

    <div class="profile-card progress-card">
      <h3 class="section-title">📈 Progress</h3>
      <div class="progress-list">
        <div class="progress-row">
          <div class="progress-top">
            <span>DSA Solved</span>
            <span class="progress-value" id="dsa-count"></span>
          </div>
          <div class="bar"><div class="fill"></div></div>
        </div>

        <div class="progress-row">
          <div class="progress-top">
            <span>HR Solved</span>
            <span class="progress-value" id="hr-count"></span>
          </div>
          <div class="bar"><div class="fill"></div></div>
        </div>

        <div class="progress-row">
          <div class="progress-top">
            <span>Aptitude Solved</span>
            <span class="progress-value" id="apt-count"></span>
          </div>
          <div class="bar"><div class="fill"></div></div>
        </div>
      </div>
    </div>

    <div class="profile-card report-card">
      <h3 class="section-title">📝 Detailed Analysis Report</h3>
      <div class="report-shell">
        <div id="analysis-report"></div>
      </div>
    </div>

  </section>
</main>

<script src="auth.js"></script>
<script src="script.js"></script>
<script>
  window.onload = function() {
    const nav = document.getElementById("nav-actions");

    if (localStorage.getItem("isLoggedIn") === "true") {
      nav.innerHTML = `
        <a href="index.html" class="auth-btn">Home</a>
        <a href="profile.html" class="auth-btn">Profile</a>
        <a href="topics.html" class="auth-btn">Practice</a>
        <a href="#" onclick="logout()" class="auth-btn">Logout</a>
      `;
    } else {
      nav.innerHTML = `
        <a href="signin.html" class="auth-btn">Sign In</a>
        <a href="signup.html" class="auth-btn">Sign Up</a>
      `;
    }
  };
</script>
</body>
</html>
