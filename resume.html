<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume Builder - JobReady</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .container {
      max-width: 800px;
      margin: var(--spacing-2xl) auto;
      padding: var(--spacing-2xl);
      background: var(--color-card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
    }

    .container h1 {
      text-align: center;
      color: var(--color-primary-dark);
      margin-bottom: var(--spacing-2xl);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-lg);
    }

    .edu-card {
      background: var(--color-bg-alt);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      margin: var(--spacing-lg) 0;
      border: 1px solid var(--color-border);
    }

    .edu-card h3 {
      color: var(--color-primary-dark);
      font-size: var(--font-size-lg);
      margin-bottom: var(--spacing-md);
    }

    label {
      display: block;
      margin-top: var(--spacing-lg);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text);
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="date"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: var(--spacing-md);
      margin-top: var(--spacing-xs);
      background: var(--color-bg-alt);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      transition: border-color var(--transition-base);
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus,
    input[type="date"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(216, 191, 216, 0.2);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      margin-top: var(--spacing-xl);
      padding: var(--spacing-md) var(--spacing-lg);
      width: 100%;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-accent) 100%);
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      transition: all var(--transition-base);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    button:active {
      transform: translateY(0);
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    .suggestions {
      background: var(--color-bg-alt);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      margin-top: var(--spacing-md);
      max-height: 200px;
      overflow-y: auto;
    }

    .suggestions div {
      padding: var(--spacing-md);
      cursor: pointer;
      transition: background-color var(--transition-base);
    }

    .suggestions div:hover {
      background: linear-gradient(135deg, rgba(216, 191, 216, 0.2) 0%, rgba(167, 139, 218, 0.2) 100%);
    }

    .selected-skills {
      margin-top: var(--spacing-lg);
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-md);
    }

    .skill-tag {
      background: linear-gradient(135deg, var(--color-primary-light) 0%, rgba(216, 191, 216, 0.3) 100%);
      padding: var(--spacing-xs) var(--spacing-md);
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      color: var(--color-primary-dark);
      font-weight: var(--font-weight-semibold);
    }

    .skill-tag span {
      cursor: pointer;
      color: var(--color-danger);
      font-weight: bold;
    }

    .skill-tag span:hover {
      color: #c50052;
    }

    .list {
      margin-top: var(--spacing-lg);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .card-item {
      background: var(--color-bg-alt);
      border: 1px solid var(--color-border);
      padding: var(--spacing-lg);
      border-radius: var(--radius-lg);
      position: relative;
      transition: all var(--transition-base);
    }

    .card-item:hover {
      border-color: var(--color-primary-light);
      box-shadow: var(--shadow-md);
    }

    .card-item span {
      position: absolute;
      right: var(--spacing-lg);
      top: var(--spacing-lg);
      cursor: pointer;
      color: var(--color-danger);
      font-weight: bold;
      transition: color var(--transition-base);
    }

    .card-item span:hover {
      color: #c50052;
    }

    #result {
      line-height: 1.8;
    }

    #result h3 {
      color: var(--color-primary-dark);
      margin-top: var(--spacing-lg);
      margin-bottom: var(--spacing-md);
    }

    #result h4 {
      color: var(--color-accent);
      margin-top: var(--spacing-lg);
      margin-bottom: var(--spacing-md);
    }

    .report {
      line-height: 1.8;
    }

    .score-box {
      background: var(--color-bg-alt);
      border: 2px solid var(--color-primary-light);
      padding: var(--spacing-xl);
      border-radius: var(--radius-lg);
      text-align: center;
      margin-bottom: var(--spacing-xl);
    }

    .score-box h3 {
      font-size: 32px;
      color: var(--color-primary-dark);
      margin: 0 0 var(--spacing-md);
    }

    .bar-container {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      margin: var(--spacing-lg) 0;
    }

    .bar {
      flex: 1;
      height: 10px;
      background: var(--color-border);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-primary) 0%, var(--color-accent) 100%);
    }

    .best-role {
      margin-top: var(--spacing-md);
      font-size: var(--font-size-lg);
      color: var(--color-success);
      font-weight: var(--font-weight-semibold);
    }

    @media (max-width: 768px) {
      .container {
        margin: var(--spacing-xl) auto;
        padding: var(--spacing-xl);
      }

      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <h1 class="logo">
  <span class="logo-icon">
    <!-- SVG ICON -->
    <svg width="36" height="36" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer Circle -->
      <circle cx="40" cy="40" r="36" fill="#e8d5f2"/>

      <!-- Resume Sheet -->
      <rect x="26" y="20" width="28" height="36" rx="4" fill="#ffffff"/>

      <!-- Resume Lines -->
      <rect x="30" y="26" width="20" height="3" rx="2" fill="#d4a7d4"/>
      <rect x="30" y="32" width="18" height="3" rx="2" fill="#d4a7d4"/>
      <rect x="30" y="38" width="16" height="3" rx="2" fill="#d4a7d4"/>

      <!-- Checkmark Circle -->
      <circle cx="50" cy="48" r="10" fill="#9d5fa0"/>

      <!-- Tick -->
      <path d="M45 48 L49 52 L56 44" 
            stroke="white" 
            stroke-width="3" 
            fill="none" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
    </svg>
  </span>

  JobReady
</h1>
    <div class="auth-buttons" id="nav-actions"></div>
  </nav>

  <div class="container">
    <h1>Resume Builder</h1>

    <!-- STEP 1: BASIC INFO -->
    <div id="step-1" class="step active">
      <label>First Name</label>
      <input type="text" id="firstName" placeholder="Enter your first name" required>

      <label>Last Name</label>
      <input type="text" id="lastName" placeholder="Enter your last name" required>

      <label>Email</label>
      <input type="email" id="email" placeholder="Enter your email address" required>

      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="Enter your phone number" required>

      <label>Date of Birth</label>
      <input type="date" id="dob" required>

      <label>Gender</label>
      <select id="gender">
        <option value="">Select your gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>

      <label>Location (City)</label>
      <input type="text" id="location" placeholder="Enter your city">

      <label>LinkedIn / Portfolio</label>
      <input type="text" id="linkedin" placeholder="Optional: paste your portfolio or LinkedIn URL">

      <button type="button" onclick="nextStep()">Next</button>
    </div>

    <!-- STEP 2: EDUCATION -->
    <div id="step-2" class="step">
      <h2>Education</h2>
      <div id="education-section">
        <!-- MAIN DEGREE -->
        <div class="edu-card">
          <h3>Degree</h3>
          <label>Degree Type</label>
          <select id="degreeType">
            <option>Undergraduate</option>
            <option>Postgraduate</option>
            <option>Diploma</option>
          </select>
          <label>Course / Degree Name</label>
          <input type="text" id="degreeName" placeholder="e.g. B.Tech in Computer Science" />
          <label>College / University</label>
          <input type="text" id="college" placeholder="Enter college name" />
          <div class="row">
            <div>
              <label>Start Year</label>
              <input type="number" id="startYear" min="2000" max="2100" />
            </div>
            <div>
              <label>End Year</label>
              <input type="number" id="endYear" min="2000" max="2100" />
            </div>
          </div>
          <label>CGPA</label>
          <input type="number" id="cgpa" step="0.01" min="0" max="10" placeholder="e.g. 8.25">
        </div>

        <!-- CLASS 12 -->
        <div class="edu-card">
          <h3>Class 12 (Required)</h3>
          <label>School Name</label>
          <input type="text" id="school12" required />
          <label>Percentage</label>
          <input type="number" id="percent12" min="0" max="100" step="0.01" required />
          <label>Year of Completion</label>
          <input type="number" id="year12" required />
        </div>

        <!-- CLASS 10 -->
        <div class="edu-card">
          <h3>Class 10 (Required)</h3>
          <label>School Name</label>
          <input type="text" id="school10" required />
          <label>Percentage</label>
          <input type="number" id="percent10" min="0" max="100" step="0.01" required />
          <label>Year of Completion</label>
          <input type="number" id="year10" required />
        </div>
      </div>

      <button type="button" onclick="prevStep()">Back</button>
      <button type="button" onclick="nextStep()">Next</button>
    </div>

    <!-- STEP 3: SKILLS -->
    <div id="step-3" class="step">
      <h2>Skills</h2>
      <p style="color: var(--color-text-light); margin-bottom: var(--spacing-md);">Add up to 5 skills</p>

      <input 
        type="text" 
        id="skillInput" 
        placeholder="E.g. React, Python, JavaScript"
        oninput="showSuggestions()"
      >

      <div id="suggestions" class="suggestions"></div>

      <!-- Selected skills -->
      <div id="selectedSkills" class="selected-skills"></div>

      <button type="button" onclick="prevStep()">Back</button>
      <button type="button" onclick="nextStep()">Next</button>
    </div>

    <!-- STEP 4: EXPERIENCE & PROJECTS -->
    <div id="step-4" class="step">
      <h2>Experience & Projects</h2>

      <!-- EXPERIENCE -->
      <h3 style="margin-top: var(--spacing-xl);">Professional Experience</h3>

      <label>Job Title</label>
      <input type="text" id="jobTitle" placeholder="e.g. Software Developer">

      <label>Company</label>
      <input type="text" id="company" placeholder="Enter company name">

      <label>Duration</label>
      <input type="text" id="duration" placeholder="e.g. Jan 2023 - Dec 2023">

      <label>Work Done</label>
      <textarea id="workDesc" placeholder="Describe your responsibilities and achievements..."></textarea>

      <button type="button" onclick="addExperience()">Add Experience</button>

      <!-- Display -->
      <div id="experienceList" class="list"></div>

      <!-- PROJECTS -->
      <h3 style="margin-top: var(--spacing-2xl);">Projects</h3>

      <label>Project Title</label>
      <input type="text" id="projectTitle" placeholder="Enter project name">

      <label>Description</label>
      <textarea id="projectDesc" placeholder="Describe your project and what you built..."></textarea>

      <button type="button" onclick="addProject()">Add Project</button>

      <!-- Display -->
      <div id="projectList" class="list"></div>

      <button type="button" onclick="prevStep()">Back</button>
      <button type="button" onclick="submitForm()">Analyze My Resume</button>
    </div>

    <!-- RESULT -->
    <div id="result" class="step">
      <h2 style="text-align: center; color: var(--color-primary-dark);">Resume Analysis</h2>
      <p id="output"></p>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="script.js"></script>
  <script>
    window.onload = function() {
      const nav = document.getElementById("nav-actions");

      if (localStorage.getItem("isLoggedIn") === "true") {
        nav.innerHTML = `
          <a href="index.html" class="auth-btn">Home</a>
          <a href="profile.html" class="auth-btn">Profile</a>
          <a href="topics.html" class="auth-btn">Practice</a>
          <a href="#" onclick="logout()" class="auth-btn">Logout</a>
        `;
      } else {
        nav.innerHTML = `
          <a href="signin.html" class="auth-btn">Sign In</a>
          <a href="signup.html" class="auth-btn">Sign Up</a>
        `;
      }
    };
  </script>
</body>
</html>
