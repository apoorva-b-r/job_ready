<!DOCTYPE html>
<html>
<head>
  <title>Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <h1 class="logo">
  <span class="logo-icon">
    <!-- SVG ICON -->
    <svg width="36" height="36" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer Circle -->
      <circle cx="40" cy="40" r="36" fill="#e8d5f2"/>

      <!-- Resume Sheet -->
      <rect x="26" y="20" width="28" height="36" rx="4" fill="#ffffff"/>

      <!-- Resume Lines -->
      <rect x="30" y="26" width="20" height="3" rx="2" fill="#d4a7d4"/>
      <rect x="30" y="32" width="18" height="3" rx="2" fill="#d4a7d4"/>
      <rect x="30" y="38" width="16" height="3" rx="2" fill="#d4a7d4"/>

      <!-- Checkmark Circle -->
      <circle cx="50" cy="48" r="10" fill="#9d5fa0"/>

      <!-- Tick -->
      <path d="M45 48 L49 52 L56 44" 
            stroke="white" 
            stroke-width="3" 
            fill="none" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
    </svg>
  </span>

  JobReady
</h1>
  <a href="index.html" class="auth-btn">Home</a>
</nav>

<div class="auth-page">
  <h2>Sign In</h2>

  <input type="email" id="login-email" placeholder="Enter your email">
  <input type="password" id="login-password" placeholder="Enter your password">

  <button onclick="login()">Sign In</button>
  <p>
    Don't have an account? <a href="signup.html">Sign Up</a>
  </p>
</div>

<script src="auth.js"></script>
</body>
</html>
